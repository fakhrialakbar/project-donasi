<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

  <div class="bg-gray-300 p-10 rounded-xl w-[500px] text-center">

    <!-- TITLE -->
    <h1 class="bg-green-400 inline-block px-10 py-2 rounded-full mb-6 font-bold">
      Register
    </h1>

    <!-- EMAIL -->
    <div class="mb-4 text-left">
      <label class="bg-green-400 px-4 py-1 rounded-full text-sm">
        Email/Username
      </label>
      <input type="text" class="w-full mt-2 p-3 rounded-lg outline-none">
    </div>

    <!-- PASSWORD -->
    <div class="mb-4 text-left">
      <label class="bg-green-400 px-4 py-1 rounded-full text-sm">
        Password
      </label>
      <input type="password" class="w-full mt-2 p-3 rounded-lg outline-none">
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="mb-6 text-left">
      <label class="bg-green-400 px-4 py-1 rounded-full text-sm">
        Confirm Password
      </label>
      <input type="password" class="w-full mt-2 p-3 rounded-lg outline-none">
    </div>

    <!-- SUBMIT -->
    <button class="bg-green-400 px-10 py-3 rounded-xl text-xl font-semibold mb-4">
      Submit
    </button>

    <!-- MORE INFO -->
    <div>
      <button class="bg-green-400 px-6 py-1 rounded-full text-sm">
        More info
      </button>
    </div>

    <!-- BACK -->
    <div class="flex justify-end mt-6">
      <a href="index.html" class="bg-green-400 px-4 py-1 rounded-full text-sm">
        Back
      </a>
    </div>

  </div>

</body>
</html>
